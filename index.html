<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ 全科超级学习利器 v5.0</title>
<!-- 引入核心库 -->
<script>window.MathJax={tex:{inlineMath:[['$','$'],['\\(','\\)']],displayMath:[['$$','$$']]}};</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.min.js"></script>
<!-- 引入扩展控制 -->
<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/controls/OrbitControls.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:"PingFang SC","Microsoft YaHei",sans-serif; }
body { background:#0f1424; color:#e8ecf5; min-height:100vh; overflow-x:hidden; }
header { background:linear-gradient(90deg,#1a2347,#2b1a47); padding:14px 20px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
nav { display:flex; gap:6px; flex-wrap:wrap; padding:10px 16px; background:#141a30; position:sticky; top:0; z-index:100; border-bottom:1px solid #2b3760; }
nav button { background:#222b4d; color:#cfd8f5; border:none; padding:9px 13px; border-radius:20px; cursor:pointer; font-size:13px; }
nav button.active { background:linear-gradient(90deg,#4f6ef7,#9b59f7); color:#fff; }
main { padding:16px; max-width:1000px; margin:0 auto; }
.page { display:none; } .page.show { display:block; }
.card { background:#1a2138; border:1px solid #2b3760; border-radius:14px; padding:16px; margin-bottom:14px; position:relative; }
.card h2 { font-size:16px; color:#8fa6ff; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
input, select, textarea { background:#10162b; color:#fff; border:1px solid #33406e; border-radius:8px; padding:10px; font-size:14px; outline:none; }
button.act { background:linear-gradient(90deg,#4f6ef7,#9b59f7); border:none; color:#fff; padding:10px 18px; border-radius:10px; cursor:pointer; font-size:14px; font-weight:bold; }
.out { background:#10162b; border-radius:10px; padding:14px; margin-top:10px; min-height:40px; line-height:1.8; font-size:14px; white-space:pre-wrap; word-break:break-word; border:1px solid #2b3760; }
#geo-canvas { width:100%; height:400px; background:#0a0e1c; border-radius:10px; margin-top:10px; touch-action:none; }
.node-label { position:absolute; color:#7ee0a3; font-weight:bold; pointer-events:none; font-size:14px; text-shadow:1px 1px 2px #000; }
.spin { display:inline-block; animation:r 1s linear infinite; } @keyframes r{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<header><h1>⚡ 全科超级学习利器</h1><span id="keyState" style="font-size:12px;color:#7ee0a3;margin-left:auto;"></span></header>
<nav id="topNav">
    <button class="active" onclick="go('learn',this)">📖 讲解</button>
    <button onclick="go('geo3d',this)">🧊 立体几何3D</button>
    <button onclick="go('quiz',this)">🎯 出题</button>
    <button onclick="go('set',this)">⚙️ 设置</button>
</nav>

<main>
    <!-- 1. 知识讲解 -->
    <section id="learn" class="page show">
        <div class="card">
            <h2>输入任何学科问题</h2>
            <input type="text" id="customTopic" placeholder="例：氧化还原反应配平技巧" style="width:100%;margin-bottom:10px;">
            <button class="act" onclick="askAI()">获取详细讲解</button>
            <div class="out" id="learnOut">支持物理、数学、化学、生物。</div>
        </div>
    </section>

    <!-- 2. 立体几何 3D 核心模块 (不再依赖 geo.html) -->
    <section id="geo3d" class="page">
        <div class="card">
            <h2>🧊 3D 立体几何实验室 (支持圆柱、圆锥、标注)</h2>
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <input type="text" id="geoIn" placeholder="输入：正方体棱长2，或 圆柱高3半径1.5" style="flex:1">
                <button class="act" onclick="handleGeoSolve()">生成图并解题</button>
            </div>
            <div id="geo-canvas-container" style="position:relative;">
                <canvas id="geo-canvas"></canvas>
                <!-- 动态字母标注将由 JS 注入到这里 -->
                <div id="geo-labels" style="position:absolute;top:0;left:0;pointer-events:none;width:100%;height:100%;"></div>
            </div>
            <div class="out" id="geoOut">等待指令...</div>
        </div>
    </section>

    <!-- 3. 自动出题 -->
    <section id="quiz" class="page">
        <div class="card">
            <h2>AI 智能出题</h2>
            <select id="qSubj"><option>物理</option><option>数学</option><option>化学</option></select>
            <button class="act" onclick="generateQuiz()">出一道题</button>
            <div class="out" id="quizOut"></div>
        </div>
    </section>

    <!-- 4. 设置 -->
    <section id="set" class="page">
        <div class="card">
            <h2>API 配置</h2>
            <input type="password" id="apikey" placeholder="粘贴你的智谱 API Key" style="width:100%;margin-bottom:10px;">
            <button class="act" onclick="saveKey()">保存配置</button>
            <p style="font-size:12px;color:#9fb0d8;margin-top:10px;">Key 仅保存在浏览器本地，绝不上传。</p>
        </div>
    </section>
</main>

<script>
const qs=s=>document.querySelector(s);
function go(id,btn){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'));
    qs('#'+id).classList.add('show');
    document.querySelectorAll('#topNav button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    if(id==='geo3d') initThree();
}

/* === API 核心 === */
function saveKey(){ localStorage.setItem('zk',qs('#apikey').value); alert('已保存！'); checkKeyState(); }
function checkKeyState(){ qs('#keyState').textContent = localStorage.getItem('zk') ? "✅ API已就绪" : "⚠️ 未配置Key"; }
checkKeyState();

async function callAI(prompt, outEl){
    const key = localStorage.getItem('zk');
    if(!key){ outEl.textContent="请在设置中配置 API Key"; return; }
    outEl.innerHTML = '<span class="spin">⏳</span> AI 正在深度思考...';
    try {
        const r = await fetch("https://open.bigmodel.cn/api/paas/v4/chat/completions",{
            method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},
            body:JSON.stringify({model:"glm-4-flash",messages:[{role:"user",content:prompt}]})
        });
        const d = await r.json();
        const res = d.choices[0].message.content;
        outEl.innerHTML = res.replace(/\n/g,'<br>');
        if(window.MathJax) MathJax.typesetPromise();
        return res;
    } catch(e) { outEl.textContent="连接失败，请检查网络或Key。"; }
}

/* === 3D 几何确定性引擎 === */
const GeoKernel = {
    cube: (a=2) => ({
        pts: {A:[0,0,0],B:[a,0,0],C:[a,a,0],D:[0,a,0],A1:[0,0,a],B1:[a,0,a],C1:[a,a,a],D1:[0,a,a]},
        edges: [['A','B'],['B','C'],['C','D'],['D','A'],['A1','B1'],['B1','C1'],['C1','D1'],['D1','A1'],['A','A1'],['B','B1'],['C','C1'],['D','D1']]
    }),
    cylinder: (r=1.5, h=3) => ({
        type: 'cylinder', r, h,
        pts: {O:[0,0,0],O1:[0,0,h],M:[r,0,0],N:[r,0,h]}
    }),
    cone: (r=1.5, h=3) => ({
        type: 'cone', r, h,
        pts: {O:[0,0,0],P:[0,0,h],M:[r,0,0]}
    })
};

let scene, camera, renderer, controls, group;
function initThree(){
    if(scene) return;
    const canvas = qs('#geo-canvas');
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0e1c);
    camera = new THREE.PerspectiveCamera(45, canvas.clientWidth/canvas.clientHeight, 0.1, 1000);
    camera.position.set(8, 6, 8);
    renderer = new THREE.WebGLRenderer({canvas, antialias:true});
    renderer.setSize(canvas.clientWidth, canvas.clientHeight);
    controls = new THREE.OrbitControls(camera, renderer.domElement);
    group = new THREE.Group();
    scene.add(group);
    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const l = new THREE.DirectionalLight(0xffffff, 0.5); l.position.set(5,10,5); scene.add(l);
    function anim(){ requestAnimationFrame(anim); controls.update(); renderer.render(scene, camera); updateLabels(); }
    anim();
}

let activePoints = {};
function drawGeo(spec){
    while(group.children.length > 0) group.remove(group.children[0]);
    activePoints = {};
    const vMap = {};
    // 画点
    Object.keys(spec.pts).forEach(k => {
        const p = spec.pts[k];
        const pos = new THREE.Vector3(p[0], p[2], p[1]);
        vMap[k] = pos;
        activePoints[k] = pos;
        const dot = new THREE.Mesh(new THREE.SphereGeometry(0.1), new THREE.MeshBasicMaterial({color:0x7ee0a3}));
        dot.position.copy(pos);
        group.add(dot);
    });
    // 画棱
    if(spec.edges) {
        spec.edges.forEach(e => {
            const g = new THREE.BufferGeometry().setFromPoints([vMap[e[0]], vMap[e[1]]]);
            group.add(new THREE.Line(g, new THREE.LineBasicMaterial({color:0x4f6ef7})));
        });
    }
    // 特殊几何体
    if(spec.type === 'cylinder'){
        const m = new THREE.Mesh(new THREE.CylinderGeometry(spec.r,spec.r,spec.h,32), new THREE.MeshPhongMaterial({color:0x4f6ef7,transparent:true,opacity:0.3}));
        m.position.y = spec.h/2; group.add(m);
    } else if(spec.type === 'cone'){
        const m = new THREE.Mesh(new THREE.ConeGeometry(spec.r,spec.h,32), new THREE.MeshPhongMaterial({color:0x9b59f7,transparent:true,opacity:0.3}));
        m.position.y = spec.h/2; group.add(m);
    }
}

function updateLabels(){
    const labelContainer = qs('#geo-labels');
    labelContainer.innerHTML = '';
    const canvas = qs('#geo-canvas');
    Object.keys(activePoints).forEach(name => {
        const pos = activePoints[name].clone().project(camera);
        const x = (pos.x * 0.5 + 0.5) * canvas.clientWidth;
        const y = (pos.y * -0.5 + 0.5) * canvas.clientHeight;
        const div = document.createElement('div');
        div.className = 'node-label';
        div.style.left = x + 'px';
        div.style.top = (y - 20) + 'px';
        div.textContent = name;
        labelContainer.appendChild(div);
    });
}

async function handleGeoSolve(){
    initThree();
    const input = qs('#geoIn').value;
    let spec;
    if(/圆柱/.test(input)) spec = GeoKernel.cylinder();
    else if(/圆锥/.test(input)) spec = GeoKernel.cone();
    else spec = GeoKernel.cube();
    
    drawGeo(spec);
    await callAI(`你是一位立体几何专家，请解答题目：${input}。请给出建系坐标和分步解析。`, qs('#geoOut'));
}

/* === 其他功能 === */
async function askAI(){ await callAI(qs('#customTopic').value, qs('#learnOut')); }
async function generateQuiz(){ await callAI(`请出一道关于${qs('#qSubj').value}的计算题并给出答案`, qs('#quizOut')); }
</script>
</body>
</html>
