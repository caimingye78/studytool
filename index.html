<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ 全科超级学习利器 v6.0</title>
<script>window.MathJax={tex:{inlineMath:[['$','$'],['\\(','\\)']],displayMath:[['$$','$$']]}};</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.min.js"></script>
<script src="https://www.geogebra.org/apps/deployggb.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"PingFang SC","Microsoft YaHei",sans-serif}
body{background:#0f1424;color:#e8ecf5;min-height:100vh}
header{background:linear-gradient(90deg,#1a2347,#2b1a47);padding:14px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
header h1{font-size:20px}
nav{display:flex;gap:4px;flex-wrap:wrap;padding:8px 12px;background:#141a30;position:sticky;top:0;z-index:10;box-shadow:0 4px 10px rgba(0,0,0,0.3)}
nav button{background:#222b4d;color:#cfd8f5;border:none;padding:8px 12px;border-radius:6px;cursor:pointer;font-size:12px;margin:2px}
nav button.active{background:linear-gradient(90deg,#4f6ef7,#9b59f7);color:#fff;font-weight:bold}
main{padding:12px;max-width:1000px;margin:0 auto}
.page{display:none}.page.show{display:block}
.card{background:#1a2138;border:1px solid #2b3760;border-radius:14px;padding:16px;margin-bottom:14px}
.card h2{font-size:16px;color:#8fa6ff;margin-bottom:10px;display:flex;align-items:center;gap:8px}
button.act{background:linear-gradient(90deg,#4f6ef7,#9b59f7);border:none;color:#fff;padding:10px 18px;border-radius:10px;cursor:pointer;font-size:14px;margin:4px 4px 4px 0}
button.sub{background:#2b3760;border:none;color:#cfd8f5;padding:8px 14px;border-radius:10px;cursor:pointer;font-size:13px;margin:4px 4px 4px 0}
select,input[type=text],input[type=password],textarea{background:#10162b;color:#fff;border:1px solid #33406e;border-radius:8px;padding:9px;font-size:14px}
.out{background:#10162b;border-radius:10px;padding:14px;margin-top:10px;min-height:40px;line-height:1.85;font-size:14px;white-space:pre-wrap;word-break:break-word}
canvas.sim{background:#0a0e1c;border-radius:10px;width:100%;touch-action:none}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:6px 0}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0}
.chips button{background:#243056;color:#cfe;border:none;padding:6px 10px;border-radius:12px;cursor:pointer;font-size:12px}
.chips.math button{background:#2e2450}.chips.chem button{background:#1f4030}.chips.bio button{background:#40331f}
.pt{display:grid;grid-template-columns:repeat(18,1fr);gap:2px}.pt button{background:#16331f;color:#cfe;border:1px solid #2e5c3a;border-radius:4px;font-size:8px;padding:2px 0}
.tag{font-size:12px;color:#7ee0a3}
iframe.geo-frame { width:100%; height:800px; border:none; border-radius:12px; background:#fff; }
</style>
</head>
<body>
<header><h1>⚡ 全科超级学习利器</h1><span class="tag" id="keyState"></span></header>
<nav id="mainNav">
    <button class="active" onclick="go('learn',this)">📖 知识讲解</button>
    <button onclick="go('chem',this)">🧪 化学生物</button>
    <button onclick="go('study',this)">🦉 学霸工具</button>
    <button onclick="go('geo3d',this)">🧊 立体几何3D</button>
    <button onclick="go('mathlab',this)">📐 函数实验</button>
    <button onclick="go('ggb',this)">🧮 GeoGebra</button>
    <button onclick="go('lab',this)">🔬 2D物理</button>
    <button onclick="go('lab3d',this)">🪐 3D物理</button>
    <button onclick="go('quiz',this)">🎯 自动出题</button>
    <button onclick="go('photo',this)">📷 拍照解题</button>
    <button onclick="go('vidlab',this)">🎬 视频分析</button>
    <button onclick="window.open('cards.html')">🃏 牌局分析</button>
    <button onclick="go('set',this)">⚙️ 设置</button>
</nav>

<main>
    <!-- 1. 知识讲解 -->
    <section id="learn" class="page show">
        <div class="card"><h2>⚛️ 物理专题</h2><div class="chips" id="topicsP"></div></div>
        <div class="card"><h2>📐 数学专题</h2><div class="chips math" id="topicsM"></div></div>
        <div class="card"><h2>🧪 化学专题</h2><div class="chips chem" id="topicsC"></div></div>
        <div class="card"><h2>🧬 生物专题</h2><div class="chips bio" id="topicsB"></div></div>
        <div class="card"><h2>自由提问</h2>
            <div class="row"><input type="text" id="customTopic" placeholder="任何理科问题..." style="flex:1"><button class="act" onclick="explain(qs('#customTopic').value)">提问</button></div>
            <div class="out" id="learnOut">点击上方知识点开始学习。</div>
        </div>
    </section>

    <!-- 2. 化学生物 -->
    <section id="chem" class="page">
        <div class="card"><h2>🧪 元素周期表</h2><div class="pt" id="ptGrid"></div><div class="out" id="ptOut">点元素看详评。</div></div>
        <div class="card"><h2>⚖️ 方程式解析</h2><input type="text" id="eqIn" placeholder="如: Cu+HNO3(稀)" style="width:100%"><button class="act" onclick="balanceEq()">配平解析</button><div class="out" id="eqOut"></div></div>
        <div class="card"><h2>🧬 生物流程拆解</h2><div class="chips bio" id="bioChips"></div><div class="out" id="bioOut"></div></div>
    </section>

    <!-- 3. 学霸工具 -->
    <section id="study" class="page">
        <div class="card"><h2>🦉 费曼学习法</h2><textarea id="feyText" placeholder="用自己的话讲一遍知识点..." style="width:100%;height:100px"></textarea><button class="act" onclick="feynman()">AI 批改</button><div class="out" id="feyOut"></div></div>
        <div class="card"><h2>📕 错题本</h2><div id="wrongList"></div></div>
    </section>

    <!-- 4. 立体几何 3D (核心修复) -->
    <section id="geo3d" class="page">
        <div class="card" style="padding:0; background:#fff">
            <iframe src="geo.html" class="geo-frame" id="geoIframe"></iframe>
        </div>
    </section>

    <!-- 5. 数学函数 -->
    <section id="mathlab" class="page">
        <div class="card"><h2>📈 函数实验室</h2><input type="text" id="fx" value="a*sin(x)" style="width:100%"><input type="range" id="aSlider" min="-5" max="5" step="0.1" oninput="drawFx()"><canvas id="cm" class="sim" width="800" height="400"></canvas></div>
    </section>

    <!-- 6. GeoGebra -->
    <section id="ggb" class="page">
        <div id="ggbDiv" style="width:100%;height:600px"></div>
    </section>

    <!-- 7. 2D 物理 -->
    <section id="lab" class="page">
        <div class="card"><h2>🚀 抛体运动</h2><button class="act" onclick="fire()">发射</button><canvas id="c1" class="sim" width="800" height="300"></canvas></div>
        <div class="card"><h2>🕰 单摆</h2><canvas id="c3" class="sim" width="800" height="300"></canvas></div>
    </section>

    <!-- 8. 3D 物理 -->
    <section id="lab3d" class="page">
        <div class="card"><h2>🛰 3D 卫星轨道</h2><canvas id="t1" class="sim" width="800" height="400"></canvas></div>
    </section>

    <!-- 9. 其他功能 (设置、出题等) -->
    <section id="set" class="page">
        <div class="card"><h2>⚙️ API 设置</h2><input type="password" id="cfgKey" placeholder="智谱 API Key"><button class="act" onclick="saveCfg()">保存</button></div>
    </section>
</main>

<script>
const qs=s=>document.querySelector(s);
let lastText="", lastQuestion="";

// 导航
function go(id,btn){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'));
    qs('#'+id).classList.add('show');
    document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
    if(btn) btn.classList.add('active');
    if(id==='lab3d') init3D();
    if(id==='ggb') loadGGB();
}

// 通用 AI 调用
async function callAI(msgs,vision,outEl){
    const key=localStorage.getItem('zk');
    if(!key){outEl.textContent='请先设置 Key';return;}
    outEl.innerHTML='思考中...';
    try{
        const r=await fetch('https://open.bigmodel.cn/api/paas/v4/chat/completions',{
            method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
            body:JSON.stringify({model:vision?'glm-4v-flash':'glm-4-flash',messages:msgs})
        });
        const d=await r.json();
        const t=d.choices[0].message.content;
        outEl.innerHTML=t.replace(/\n/g,'<br>');
        if(window.MathJax) MathJax.typesetPromise();
        return t;
    }catch(e){outEl.textContent='失败:'+e.message;}
}

// 知识点填充
const TP=['牛顿第二定律','动量守恒','机械能守恒'], TM=['导数应用','圆锥曲线','三角函数'];
TP.forEach(t=>{const b=document.createElement('button');b.textContent=t;b.onclick=()=>explain(t);qs('#topicsP').appendChild(b)});
TM.forEach(t=>{const b=document.createElement('button');b.textContent=t;b.onclick=()=>explain(t);qs('#topicsM').appendChild(b)});

function explain(t){ callAI([{role:'user',content:'讲解知识点:'+t}],false,qs('#learnOut')); }

// 周期表
const PT=['H','He','Li','Be','B','C','N','O'];
PT.forEach((s,i)=>{const b=document.createElement('button');b.textContent=s;b.onclick=()=>callAI([{role:'user',content:'解释元素:'+s}],false,qs('#ptOut'));qs('#ptGrid').appendChild(b)});

// 物理/数学引擎逻辑 (此处省略具体绘制代码，保持 v4.0 原样)
function saveCfg(){localStorage.setItem('zk',qs('#cfgKey').value);alert('保存成功');}

// 初始化
window.onload=()=>{
    if(localStorage.getItem('zk')) qs('#keyState').textContent='✅ API Key 已配置';
};
</script>
</body>
</html>
