<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>3D 立体几何实验室 - 确定性增强版</title>
    <!-- 引入 Three.js -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/renderers/CSS2DRenderer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background: #0f1424; color: white; font-family: sans-serif; overflow: hidden; }
        #ui-overlay { position: absolute; top: 10px; left: 10px; z-index: 100; width: 320px; }
        .card { background: rgba(26, 33, 56, 0.9); border: 1px solid #2b3760; border-radius: 12px; padding: 15px; margin-bottom: 10px; }
        input { width: 100%; background: #10162b; color: white; border: 1px solid #33406e; padding: 8px; border-radius: 6px; margin-bottom: 10px; box-sizing: border-box; }
        button { background: linear-gradient(90deg, #4f6ef7, #9b59f7); color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
        #log { font-size: 13px; line-height: 1.6; color: #cfd8f5; max-height: 400px; overflow-y: auto; }
        .label { color: #7ee0a3; font-weight: bold; font-size: 16px; text-shadow: 1px 1px 2px #000; }
        .measure-tag { color: #f77; background: rgba(0,0,0,0.5); padding: 2px 5px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>
    <div id="ui-overlay">
        <div class="card">
            <input type="text" id="problemInput" placeholder="输入题目：如 正方体棱长2，求AC与BD1的角">
            <button onclick="solveProblem()">生成 3D 图并解题</button>
        </div>
        <div class="card" id="log-card" style="display:none;">
            <div id="log">正在等待输入...</div>
        </div>
    </div>
    <div id="canvas-container"></div>

<script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/renderers/CSS2DRenderer.js';

    let scene, camera, renderer, labelRenderer, controls, group;

    // --- 1. 确定性几何内核 (Deterministic Kernel) ---
    const GeoKernel = {
        cube: (a=2) => ({
            points: { A:[0,0,0], B:[a,0,0], C:[a,a,0], D:[0,a,0], A1:[0,0,a], B1:[a,0,a], C1:[a,a,a], D1:[0,a,a] },
            edges: [['A','B'],['B','C'],['C','D'],['D','A'],['A1','B1'],['B1','C1'],['C1','D1'],['D1','A1'],['A','A1'],['B','B1'],['C','C1'],['D','D1']]
        }),
        pyramid: (a=2, h=3) => ({
            points: { A:[-a/2,-a/2,0], B:[a/2,-a/2,0], C:[a/2,a/2,0], D:[-a/2,a/2,0], P:[0,0,h], O:[0,0,0] },
            edges: [['A','B'],['B','C'],['C','D'],['D','A'],['A','P'],['B','P'],['C','P'],['D','P'], ['P','O']]
        }),
        cylinder: (r=1.5, h=3) => {
            const pts = { O:[0,0,0], O1:[0,0,h] };
            for(let i=0; i<4; i++){
                const ang = (i/4)*Math.PI*2;
                pts['M'+i] = [r*Math.cos(ang), r*Math.sin(ang), 0];
                pts['N'+i] = [r*Math.cos(ang), r*Math.sin(ang), h];
            }
            return { points: pts, r, h, type: 'cylinder' };
        },
        cone: (r=1.5, h=3) => {
            const pts = { O:[0,0,0], P:[0,0,h] };
            for(let i=0; i<4; i++){
                const ang = (i/4)*Math.PI*2;
                pts['M'+i] = [r*Math.cos(ang), r*Math.sin(ang), 0];
            }
            return { points: pts, r, h, type: 'cone' };
        }
    };

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0e1c);
        
        camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(10, 8, 10);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        controls = new OrbitControls(camera, renderer.domElement);
        group = new THREE.Group();
        scene.add(group);

        const ambient = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 0.5);
        sun.position.set(5, 10, 7);
        scene.add(sun);

        window.addEventListener('resize', onWindowResize);
        animate();
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
        labelRenderer.render(scene, camera);
    }

    // --- 2. 渲染逻辑 (Render Logic) ---
    window.renderModel = (spec) => {
        while(group.children.length > 0) group.remove(group.children[0]);
        
        const vMap = {};
        Object.keys(spec.points).forEach(name => {
            const p = spec.points[name];
            const pos = new THREE.Vector3(p[0], p[2], p[1]); // 数学 Z-up 转 Three Y-up
            vMap[name] = pos;

            // 绘制顶点小球
            const dot = new THREE.Mesh(new THREE.SphereGeometry(0.1), new THREE.MeshBasicMaterial({color: 0x7ee0a3}));
            dot.position.copy(pos);
            group.add(dot);

            // 绘制 HTML 标签
            const div = document.createElement('div');
            div.className = 'label';
            div.textContent = name;
            const label = new CSS2DObject(div);
            label.position.set(pos.x, pos.y + 0.3, pos.z);
            group.add(label);
        });

        // 绘制普通棱
        const edgeMat = new THREE.LineBasicMaterial({color: 0x33406e});
        if(spec.edges) {
            spec.edges.forEach(e => {
                const geo = new THREE.BufferGeometry().setFromPoints([vMap[e[0]], vMap[e[1]]]);
                group.add(new THREE.Line(geo, edgeMat));
            });
        }

        // 处理曲面
        if(spec.type === 'cylinder') {
            const mesh = new THREE.Mesh(
                new THREE.CylinderGeometry(spec.r, spec.r, spec.h, 32, 1, true),
                new THREE.MeshPhongMaterial({color: 0x4f6ef7, transparent: true, opacity: 0.3, side: THREE.DoubleSide})
            );
            mesh.position.y = spec.h/2;
            group.add(mesh);
        } else if(spec.type === 'cone') {
            const mesh = new THREE.Mesh(
                new THREE.ConeGeometry(spec.r, spec.h, 32, 1, true),
                new THREE.MeshPhongMaterial({color: 0x9b59f7, transparent: true, opacity: 0.3, side: THREE.DoubleSide})
            );
            mesh.position.y = spec.h/2;
            group.add(mesh);
        }

        // 自动高亮题目中的线段 (Highlight Logic)
        const input = document.getElementById('problemInput').value;
        const matches = input.match(/[A-Z][0-1]?[A-Z][0-1]?/g);
        if(matches) {
            matches.forEach(pair => {
                const p1 = pair.substring(0, pair.length/2);
                const p2 = pair.substring(pair.length/2);
                if(vMap[p1] && vMap[p2]) {
                    const hGeo = new THREE.BufferGeometry().setFromPoints([vMap[p1], vMap[p2]]);
                    const hLine = new THREE.Line(hGeo, new THREE.LineBasicMaterial({color: 0xffa500, linewidth: 3}));
                    group.add(hLine);
                    
                    // 标注长度
                    const mid = new THREE.Vector3().addVectors(vMap[p1], vMap[p2]).multiplyScalar(0.5);
                    const dist = vMap[p1].distanceTo(vMap[p2]).toFixed(1);
                    const dDiv = document.createElement('div');
                    dDiv.className = 'measure-tag';
                    dDiv.textContent = `L=${dist}`;
                    const dLabel = new CSS2DObject(dDiv);
                    dLabel.position.copy(mid);
                    group.add(dLabel);
                }
            });
        }
    };

    window.solveProblem = async () => {
        const input = document.getElementById('problemInput').value;
        const log = document.getElementById('log');
        document.getElementById('log-card').style.display = 'block';
        
        let spec;
        if(/圆柱/.test(input)) spec = GeoKernel.cylinder();
        else if(/圆锥/.test(input)) spec = GeoKernel.cone();
        else if(/棱锥|四棱锥/.test(input)) spec = GeoKernel.pyramid();
        else spec = GeoKernel.cube();

        window.renderModel(spec);
        
        log.innerHTML = "正在联系 AI 生成详细步骤...";
        // 调用父窗口的 AI 接口
        if(window.parent && window.parent.callAI) {
            const resp = await window.parent.callAI([{role:"user", content: "你是一位立体几何专家，请详细解答此题，要求给出建系坐标和最终结果。题目：" + input}], false, log);
            log.innerHTML = resp.replace(/\n/g, "<br>");
        }
    };

    init();
</script>
</body>
</html>
