<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 立体几何实验室</title>
    <!-- 引入 Three.js 相关库 -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/renderers/CSS2DRenderer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background: #0f1424; color: white; font-family: sans-serif; overflow: hidden; }
        #ui-overlay { position: absolute; top: 10px; left: 10px; z-index: 100; width: 300px; pointer-events: none; }
        .card { background: rgba(26, 33, 56, 0.9); border: 1px solid #2b3760; border-radius: 12px; padding: 15px; margin-bottom: 10px; pointer-events: auto; }
        input { width: 100%; background: #10162b; color: white; border: 1px solid #33406e; padding: 10px; border-radius: 6px; margin-bottom: 10px; box-sizing: border-box; outline: none; }
        button { background: linear-gradient(90deg, #4f6ef7, #9b59f7); color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
        button:active { transform: scale(0.98); }
        #log { font-size: 13px; line-height: 1.6; color: #cfd8f5; max-height: 300px; overflow-y: auto; }
        .label { color: #7ee0a3; font-weight: bold; font-size: 16px; pointer-events: none; }
        .measure-tag { color: #ff7b7b; background: rgba(0,0,0,0.6); padding: 2px 5px; border-radius: 4px; font-size: 12px; border: 1px solid #ff7b7b; }
    </style>
</head>
<body>
    <div id="ui-overlay">
        <div class="card">
            <input type="text" id="problemInput" placeholder="输入题目，例如：正方体棱长2">
            <button id="solveBtn">生成 3D 图并解题</button>
        </div>
        <div class="card" id="log-card" style="display:none;">
            <div id="log">正在等待指令...</div>
        </div>
    </div>
    <div id="container"></div>

<script>
    // --- 核心配置与几何定义 ---
    const GeoKernel = {
        cube: (a=2) => ({
            points: { A:[0,0,0], B:[a,0,0], C:[a,a,0], D:[0,a,0], A1:[0,0,a], B1:[a,0,a], C1:[a,a,a], D1:[0,a,a] },
            edges: [['A','B'],['B','C'],['C','D'],['D','A'],['A1','B1'],['B1','C1'],['C1','D1'],['D1','A1'],['A','A1'],['B','B1'],['C','C1'],['D','D1']]
        }),
        pyramid: (a=2, h=3) => ({
            points: { A:[-a/2,-a/2,0], B:[a/2,-a/2,0], C:[a/2,a/2,0], D:[-a/2,a/2,0], P:[0,0,h], O:[0,0,0] },
            edges: [['A','B'],['B','C'],['C','D'],['D','A'],['A','P'],['B','P'],['C','P'],['D','P'], ['P','O']]
        }),
        cylinder: (r=1.5, h=3) => {
            const pts = { O:[0,0,0], O1:[0,0,h] };
            [0, 90, 180, 270].forEach((ang, i) => {
                const rad = ang * Math.PI / 180;
                pts['M'+i] = [r * Math.cos(rad), r * Math.sin(rad), 0];
                pts['N'+i] = [r * Math.cos(rad), r * Math.sin(rad), h];
            });
            return { points: pts, r, h, type: 'cylinder' };
        },
        cone: (r=1.5, h=3) => {
            const pts = { O:[0,0,0], P:[0,0,h] };
            [0, 90, 180, 270].forEach((ang, i) => {
                const rad = ang * Math.PI / 180;
                pts['M'+i] = [r * Math.cos(rad), r * Math.sin(rad), 0];
            });
            return { points: pts, r, h, type: 'cone' };
        }
    };

    let scene, camera, renderer, labelRenderer, controls, group;

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0e1c);
        camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(10, 10, 10);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('container').appendChild(renderer.domElement);

        labelRenderer = new THREE.CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        document.body.appendChild(labelRenderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        group = new THREE.Group();
        scene.add(group);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const light = new THREE.DirectionalLight(0xffffff, 0.5);
        light.position.set(5, 10, 7);
        scene.add(light);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();
        
        // 绑定按钮事件
        document.getElementById('solveBtn').addEventListener('click', solveProblem);
    }

    function renderModel(spec) {
        while(group.children.length > 0) group.remove(group.children[0]);
        const vMap = {};
        
        Object.keys(spec.points).forEach(name => {
            const p = spec.points[name];
            const pos = new THREE.Vector3(p[0], p[2], p[1]);
            vMap[name] = pos;

            const dot = new THREE.Mesh(new THREE.SphereGeometry(0.12), new THREE.MeshBasicMaterial({color: 0x7ee0a3}));
            dot.position.copy(pos);
            group.add(dot);

            const div = document.createElement('div');
            div.className = 'label';
            div.textContent = name;
            const lbl = new THREE.CSS2DObject(div);
            lbl.position.set(pos.x, pos.y + 0.4, pos.z);
            group.add(lbl);
        });

        const edgeMat = new THREE.LineBasicMaterial({color: 0x33406e});
        if(spec.edges) {
            spec.edges.forEach(e => {
                if(vMap[e[0]] && vMap[e[1]]) {
                    const geo = new THREE.BufferGeometry().setFromPoints([vMap[e[0]], vMap[e[1]]]);
                    group.add(new THREE.Line(geo, edgeMat));
                }
            });
        }

        if(spec.type === 'cylinder') {
            const mesh = new THREE.Mesh(new THREE.CylinderGeometry(spec.r, spec.r, spec.h, 32, 1, true),
                new THREE.MeshPhongMaterial({color: 0x4f6ef7, transparent: true, opacity: 0.3, side: THREE.DoubleSide}));
            mesh.position.y = spec.h/2; group.add(mesh);
        } else if(spec.type === 'cone') {
            const mesh = new THREE.Mesh(new THREE.ConeGeometry(spec.r, spec.h, 32, 1, true),
                new THREE.MeshPhongMaterial({color: 0x9b59f7, transparent: true, opacity: 0.3, side: THREE.DoubleSide}));
            mesh.position.y = spec.h/2; group.add(mesh);
        }

        // 高亮线段识别
        const input = document.getElementById('problemInput').value;
        const matches = input.match(/[A-Z][0-1]?[A-Z][0-1]?/g);
        if(matches) {
            matches.forEach(pair => {
                const p1 = pair.substring(0, pair.length/2), p2 = pair.substring(pair.length/2);
                if(vMap[p1] && vMap[p2]) {
                    const hLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints([vMap[p1], vMap[p2]]), 
                        new THREE.LineBasicMaterial({color: 0xffa500, linewidth: 3}));
                    group.add(hLine);
                    const mid = new THREE.Vector3().addVectors(vMap[p1], vMap[p2]).multiplyScalar(0.5);
                    const dDiv = document.createElement('div');
                    dDiv.className = 'measure-tag';
                    dDiv.textContent = `L=${vMap[p1].distanceTo(vMap[p2]).toFixed(1)}`;
                    const dLbl = new THREE.CSS2DObject(dDiv);
                    dLbl.position.copy(mid); group.add(dLbl);
                }
            });
        }
    }

    async function solveProblem() {
        const input = document.getElementById('problemInput').value.trim();
        if(!input) return;
        
        const logCard = document.getElementById('log-card');
        const log = document.getElementById('log');
        logCard.style.display = 'block';
        log.innerHTML = "正在计算几何模型...";

        let spec;
        if(/圆柱/.test(input)) spec = GeoKernel.cylinder();
        else if(/圆锥/.test(input)) spec = GeoKernel.cone();
        else if(/棱锥|四棱锥/.test(input)) spec = GeoKernel.pyramid();
        else spec = GeoKernel.cube();

        renderModel(spec);
        
        log.innerHTML = "模型已生成。正在请求 AI 解析...";

        try {
            // 兼容性检查：如果不在 iframe 中或者父级没有函数
            const callAI = window.parent && window.parent.callAI;
            if(callAI) {
                const resp = await callAI([{role:"user", content: "请作为理科老师，详细解答这道立体几何题，给出具体的建系坐标说明和答案。题目：" + input}], false, log);
                if(resp) log.innerHTML = resp.replace(/\n/g, "<br>");
            } else {
                log.innerHTML = "⚠️ 无法连接到主页面 AI 接口，请确保通过主页打开并配置了 API Key。";
            }
        } catch (e) {
            log.innerHTML = "❌ 请求出错：" + e.message;
        }
    }

    window.onload = init;
</script>
</body>
</html>
