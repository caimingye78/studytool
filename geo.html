<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 几何 - 增强版</title>
    <style>
        body { margin: 0; background: #0f1424; color: white; font-family: sans-serif; overflow: hidden; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 1000; width: 280px; }
        .card { background: rgba(26, 33, 56, 0.95); border: 1px solid #33406e; border-radius: 10px; padding: 12px; margin-bottom: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input { width: 100%; background: #0a0e1c; color: white; border: 1px solid #4f6ef7; padding: 8px; border-radius: 5px; box-sizing: border-box; }
        button { background: #4f6ef7; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 8px; }
        #status { font-size: 12px; margin-top: 8px; color: #7ee0a3; }
        #output { font-size: 13px; line-height: 1.5; color: #cfd8f5; max-height: 250px; overflow-y: auto; margin-top: 8px; border-top: 1px solid #33406e; padding-top: 8px; }
        .node-label { color: #7ee0a3; font-weight: bold; font-size: 14px; background: rgba(0,0,0,0.4); padding: 1px 3px; border-radius: 3px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="card">
            <input type="text" id="qIn" placeholder="例：正方体棱长2，求AC1" value="正方体棱长2">
            <button id="btn">生成 3D 模型</button>
            <div id="status">就绪。支持：正方体、圆柱、圆锥、棱锥。</div>
            <div id="output">AI 解答将在此显示...</div>
        </div>
    </div>
    <div id="canvas-host"></div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// --- 1. 引擎配置 ---
const Kernel = {
    cube: (a=2) => ({
        points: { A:[0,0,0], B:[a,0,0], C:[a,a,0], D:[0,a,0], A1:[0,0,a], B1:[a,0,a], C1:[a,a,a], D1:[0,a,a] },
        edges: [['A','B'],['B','C'],['C','D'],['D','A'],['A1','B1'],['B1','C1'],['C1','D1'],['D1','A1'],['A','A1'],['B','B1'],['C','C1'],['D','D1']]
    }),
    cylinder: (r=1.5, h=3) => ({ type:'cylinder', r, h, points:{ O:[0,0,0], O1:[0,0,h], M:[r,0,0], N:[r,0,h] }, edges:[['O','O1'],['M','N']] }),
    cone: (r=1.5, h=3) => ({ type:'cone', r, h, points:{ O:[0,0,0], P:[0,0,h], M:[r,0,0] }, edges:[['O','P'],['O','M']] }),
    pyramid: (a=2, h=3) => ({ points:{ A:[-a/2,-a/2,0], B:[a/2,-a/2,0], C:[a/2,a/2,0], D:[-a/2,a/2,0], P:[0,0,h] }, edges:[['A','B'],['B','C'],['C','D'],['D','A'],['A','P'],['B','P'],['C','P'],['D','P']] })
};

// --- 2. 初始化 3D 场景 ---
let scene, camera, renderer, labelRenderer, controls, group;

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0e1c);
    camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(8, 6, 8);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('canvas-host').appendChild(renderer.domElement);

    labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0px';
    labelRenderer.domElement.style.pointerEvents = 'none';
    document.body.appendChild(labelRenderer.domElement);

    controls = new OrbitControls(camera, renderer.domElement);
    group = new THREE.Group();
    scene.add(group);

    scene.add(new THREE.AmbientLight(0xffffff, 1));
    const light = new THREE.DirectionalLight(0xffffff, 0.5);
    light.position.set(5, 10, 7);
    scene.add(light);

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth/window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
    });

    renderLoop();
}

function animate() {
    controls.update();
    renderer.render(scene, camera);
    labelRenderer.render(scene, camera);
}

function renderLoop() {
    requestAnimationFrame(renderLoop);
    animate();
}

// --- 3. 绘图逻辑 (同步) ---
function draw(input) {
    while(group.children.length > 0) group.remove(group.children[0]);
    
    let spec;
    if(/圆柱/.test(input)) spec = Kernel.cylinder();
    else if(/圆锥/.test(input)) spec = Kernel.cone();
    else if(/棱锥/.test(input)) spec = Kernel.pyramid();
    else spec = Kernel.cube();

    const vMap = {};
    Object.keys(spec.points).forEach(name => {
        const p = spec.points[name];
        const pos = new THREE.Vector3(p[0], p[2], p[1]);
        vMap[name] = pos;

        // 点和标签
        const dot = new THREE.Mesh(new THREE.SphereGeometry(0.1), new THREE.MeshBasicMaterial({color: 0x7ee0a3}));
        dot.position.copy(pos);
        group.add(dot);

        const div = document.createElement('div');
        div.className = 'node-label';
        div.textContent = name;
        const lbl = new CSS2DObject(div);
        lbl.position.set(pos.x, pos.y + 0.3, pos.z);
        group.add(lbl);
    });

    const mat = new THREE.LineBasicMaterial({color: 0x4f6ef7});
    spec.edges.forEach(e => {
        if(vMap[e[0]] && vMap[e[1]]) {
            const geo = new THREE.BufferGeometry().setFromPoints([vMap[e[0]], vMap[e[1]]]);
            group.add(new THREE.Line(geo, mat));
        }
    });

    if(spec.type === 'cylinder') {
        const mesh = new THREE.Mesh(new THREE.CylinderGeometry(spec.r, spec.r, spec.h, 32, 1, true), new THREE.MeshPhongMaterial({color:0x4f6ef7, transparent:true, opacity:0.3, side:THREE.DoubleSide}));
        mesh.position.y = spec.h/2; group.add(mesh);
    } else if(spec.type === 'cone') {
        const mesh = new THREE.Mesh(new THREE.ConeGeometry(spec.r, spec.h, 32, 1, true), new THREE.MeshPhongMaterial({color:0x9b59f7, transparent:true, opacity:0.3, side:THREE.DoubleSide}));
        mesh.position.y = spec.h/2; group.add(mesh);
    }
}

// --- 4. 运行与 AI (异步) ---
async function run() {
    const input = document.getElementById('qIn').value;
    const status = document.getElementById('status');
    const output = document.getElementById('output');

    // 1. 立即画图 (不等待)
    try {
        draw(input);
        status.innerHTML = "✅ 模型已生成。正在联系 AI...";
    } catch(e) {
        status.innerHTML = "❌ 渲染出错: " + e.message;
        return;
    }

    // 2. 异步请求 AI
    const key = localStorage.getItem('zk');
    if(!key) {
        output.innerHTML = "<b style='color:#f77'>⚠️ 错误：未检测到 API Key。</b><br>请返回主页，点击右侧「⚙️ 设置」，填入 Key 并保存后再试。";
        return;
    }

    try {
        const res = await fetch("https://open.bigmodel.cn/api/paas/v4/chat/completions", {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": "Bearer " + key },
            body: JSON.stringify({
                model: "glm-4-flash",
                messages: [{role: "user", content: "解答此几何题：" + input}]
            })
        });
        const data = await res.json();
        output.innerHTML = data.choices[0].message.content.replace(/\n/g, "<br>");
        status.innerHTML = "✅ 解答完成。";
    } catch(e) {
        output.innerHTML = "模型已出，但 AI 连接失败。";
    }
}

document.getElementById('btn').onclick = run;
init();
</script>
</body>
</html>
