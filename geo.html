<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 立体几何超级实验室</title>
    <!-- 引入资源 -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/renderers/CSS2DRenderer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background: #0f1424; color: white; font-family: sans-serif; overflow: hidden; }
        #overlay { position: absolute; top: 15px; left: 15px; z-index: 100; width: 300px; pointer-events: none; }
        .ui-card { background: rgba(20, 26, 48, 0.9); border: 1px solid #33406e; border-radius: 12px; padding: 15px; margin-bottom: 10px; pointer-events: auto; }
        input { width: 100%; background: #0a0e1c; color: white; border: 1px solid #4f6ef7; padding: 10px; border-radius: 6px; box-sizing: border-box; margin-bottom: 10px; }
        button { background: #4f6ef7; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
        #output { font-size: 14px; line-height: 1.6; color: #cfd8f5; max-height: 300px; overflow-y: auto; border-top: 1px solid #33406e; padding-top: 10px; margin-top: 10px; }
        .node-label { color: #7ee0a3; font-weight: bold; font-size: 16px; pointer-events: none; }
        .measurement { color: #f77; background: rgba(0,0,0,0.6); padding: 2px 4px; border-radius: 3px; font-size: 12px; }
        #loading { display: none; color: #4f6ef7; font-weight: bold; }
    </style>
</head>
<body>
    <div id="overlay">
        <div class="ui-card">
            <input type="text" id="qIn" placeholder="例：正方体棱长2，求AC与BD1的角">
            <button onclick="runSolver()">生成解答 + 3D 图</button>
            <div id="loading">正在思考并渲染...</div>
            <div id="output">请输入题目，自动支持标注、辅助线及曲面体。</div>
        </div>
    </div>
    <div id="canvas-host"></div>

<script>
// --- 1. 几何体生成引擎 (确定性渲染) ---
const GeometryKernel = {
    cube: (a=2) => ({
        points: { A:[0,0,0], B:[a,0,0], C:[a,a,0], D:[0,a,0], A1:[0,0,a], B1:[a,0,a], C1:[a,a,a], D1:[0,a,a] },
        edges: [['A','B'],['B','C'],['C','D'],['D','A'],['A1','B1'],['B1','C1'],['C1','D1'],['D1','A1'],['A','A1'],['B','B1'],['C','C1'],['D','D1']]
    }),
    pyramid: (a=2, h=3) => ({
        points: { A:[-a/2,-a/2,0], B:[a/2,-a/2,0], C:[a/2,a/2,0], D:[-a/2,a/2,0], P:[0,0,h], O:[0,0,0] },
        edges: [['A','B'],['B','C'],['C','D'],['D','A'],['A','P'],['B','P'],['C','P'],['D','P'],['P','O']]
    }),
    cylinder: (r=1.5, h=3) => {
        const pts = { O:[0,0,0], O1:[0,0,h] };
        for(let i=0; i<4; i++){
            const rad = (i/4)*Math.PI*2;
            pts['M'+i] = [r*Math.cos(rad), r*Math.sin(rad), 0];
            pts['N'+i] = [r*Math.cos(rad), r*Math.sin(rad), h];
        }
        return { type: 'cylinder', points: pts, r, h };
    },
    cone: (r=1.5, h=3) => {
        const pts = { O:[0,0,0], P:[0,0,h] };
        for(let i=0; i<4; i++){
            const rad = (i/4)*Math.PI*2;
            pts['M'+i] = [r*Math.cos(rad), r*Math.sin(rad), 0];
        }
        return { type: 'cone', points: pts, r, h };
    }
};

// --- 2. 3D 渲染器初始化 ---
let scene, camera, renderer, labelRenderer, controls, group;

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0e1c);
    
    camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(10, 8, 10);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('canvas-host').appendChild(renderer.domElement);

    // 重点：字母标签渲染器
    labelRenderer = new THREE.CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0px';
    document.body.appendChild(labelRenderer.domElement);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    group = new THREE.Group();
    scene.add(group);

    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const dLight = new THREE.DirectionalLight(0xffffff, 0.5);
    dLight.position.set(5, 10, 7);
    scene.add(dLight);

    animate();
}

function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
    labelRenderer.render(scene, camera);
}

// --- 3. 核心解题与画图逻辑 ---
async function runSolver() {
    const input = document.getElementById('qIn').value;
    const output = document.getElementById('output');
    const loading = document.getElementById('loading');
    
    if(!input) return alert("请输入内容");
    loading.style.display = 'block';

    // A. 无条件识别并画图
    let spec;
    if(/圆柱/.test(input)) spec = GeometryKernel.cylinder();
    else if(/圆锥/.test(input)) spec = GeometryKernel.cone();
    else if(/棱锥|四棱锥/.test(input)) spec = GeometryKernel.pyramid();
    else spec = GeometryKernel.cube();

    drawModel(spec, input);

    // B. 获取 AI 解答
    const apiKey = localStorage.getItem('zk'); // 读取主站填写的 API Key
    if(!apiKey) {
        output.innerHTML = "⚠️ 请先在主站「设置」中填写并保存 API Key。";
        loading.style.display = 'none';
        return;
    }

    try {
        const response = await fetch("https://open.bigmodel.cn/api/paas/v4/chat/completions", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${apiKey}`
            },
            body: JSON.stringify({
                model: "glm-4-flash",
                messages: [{role: "user", content: `你是一位立体几何专家。请解答题目：${input}。给出建系坐标和分步步骤。`}]
            })
        });
        const data = await response.json();
        output.innerHTML = data.choices[0].message.content.replace(/\n/g, "<br>");
    } catch (e) {
        output.innerHTML = "AI 解答加载失败，但 3D 模型已生成。请检查网络。";
    }
    loading.style.display = 'none';
}

function drawModel(spec, input) {
    while(group.children.length > 0) group.remove(group.children[0]);
    
    const vMap = {};
    Object.keys(spec.points).forEach(name => {
        const p = spec.points[name];
        const pos = new THREE.Vector3(p[0], p[2], p[1]); // 数学 Z-up 转 Three Y-up
        vMap[name] = pos;

        // 画点
        const dot = new THREE.Mesh(new THREE.SphereGeometry(0.12), new THREE.MeshBasicMaterial({color: 0x7ee0a3}));
        dot.position.copy(pos);
        group.add(dot);

        // 画字母标签
        const div = document.createElement('div');
        div.className = 'node-label';
        div.textContent = name;
        const label = new THREE.CSS2DObject(div);
        label.position.set(pos.x, pos.y + 0.4, pos.z);
        group.add(label);
    });

    // 画线
    const lineMat = new THREE.LineBasicMaterial({color: 0x33406e});
    if(spec.edges) {
        spec.edges.forEach(e => {
            const geo = new THREE.BufferGeometry().setFromPoints([vMap[e[0]], vMap[e[1]]]);
            group.add(new THREE.Line(geo, lineMat));
        });
    }

    // 画曲面
    if(spec.type === 'cylinder') {
        const mesh = new THREE.Mesh(new THREE.CylinderGeometry(spec.r, spec.r, spec.h, 32, 1, true), 
                     new THREE.MeshPhongMaterial({color: 0x4f6ef7, transparent:true, opacity:0.3, side: THREE.DoubleSide}));
        mesh.position.y = spec.h/2; group.add(mesh);
    } else if(spec.type === 'cone') {
        const mesh = new THREE.Mesh(new THREE.ConeGeometry(spec.r, spec.h, 32, 1, true), 
                     new THREE.MeshPhongMaterial({color: 0x9b59f7, transparent:true, opacity:0.3, side: THREE.DoubleSide}));
        mesh.position.y = spec.h/2; group.add(mesh);
    }

    // 自动标注题目中提到的线段（如 AC, BD1）
    const matches = input.match(/[A-Z][0-1]?[A-Z][0-1]?/g);
    if(matches) {
        matches.forEach(m => {
            const p1 = m.substring(0, m.length/2);
            const p2 = m.substring(m.length/2);
            if(vMap[p1] && vMap[p2]) {
                const hGeo = new THREE.BufferGeometry().setFromPoints([vMap[p1], vMap[p2]]);
                group.add(new THREE.Line(hGeo, new THREE.LineBasicMaterial({color: 0xffa500, linewidth: 3})));
            }
        });
    }
}

init();
</script>
</body>
</html>
