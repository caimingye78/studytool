<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 几何实验室 v6.1 - 拍照识题版</title>
    <style>
        body { margin: 0; background: #0f1424; color: white; font-family: sans-serif; overflow: hidden; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 1000; width: 320px; }
        .card { background: rgba(26, 33, 56, 0.95); border: 1px solid #33406e; border-radius: 12px; padding: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        textarea { width: 100%; background: #0a0e1c; color: white; border: 1px solid #33406e; padding: 10px; border-radius: 6px; box-sizing: border-box; font-size: 13px; }
        .btn-group { display: flex; gap: 5px; margin-top: 10px; }
        button { flex: 1; background: linear-gradient(90deg, #4f6ef7, #9b59f7); color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px; }
        button.sub { background: #2b3760; }
        #preview-container { margin-top: 10px; display: none; text-align: center; }
        #img-prev { max-width: 100%; border-radius: 6px; border: 1px solid #4f6ef7; }
        #out { font-size: 13px; line-height: 1.6; color: #cfd8f5; max-height: 350px; overflow-y: auto; margin-top: 12px; border-top: 1px solid #33406e; padding-top: 10px; }
        .node-label { color: #7ee0a3; font-weight: bold; font-size: 15px; pointer-events: none; }
        .measure-tag { color: #f77; background: rgba(0,0,0,0.7); padding: 2px 5px; border-radius: 4px; font-size: 12px; }
    </style>
    <script>window.MathJax={tex:{inlineMath:[['$','$']]}};</script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
</head>
<body>
    <div id="ui">
        <div class="card">
            <textarea id="qIn" rows="3" placeholder="手动输入题目，或点击下方拍照上传...">正方体ABCD-A1B1C1D1棱长2，求AC1的长度</textarea>
            <div id="preview-container"><img id="img-prev"></div>
            <div class="btn-group">
                <button onclick="document.getElementById('fileIn').click()" class="sub">📷 拍照/上传</button>
                <button onclick="solve(true)">🚀 智能解析</button>
            </div>
            <input type="file" id="fileIn" accept="image/*" hidden onchange="handleImg(this)">
            <div id="out">就绪。支持拍照识别立体几何题并自动建模。</div>
        </div>
    </div>
    <div id="container"></div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

/* --- 1. 核心 Kernel --- */
const GeoKernel = {
    cube: (a=2) => ({ points: { A:[0,0,0], B:[a,0,0], C:[a,a,0], D:[0,a,0], A1:[0,0,a], B1:[a,0,a], C1:[a,a,a], D1:[0,a,a] }, edges: [['A','B'],['B','C'],['C','D'],['D','A'],['A1','B1'],['B1','C1'],['C1','D1'],['D1','A1'],['A','A1'],['B','B1'],['C','C1'],['D','D1']] }),
    cylinder: (r=1.5, h=3) => ({ type:'cylinder', r, h, points: { O:[0,0,0], O1:[0,0,h] }, edges:[] }),
    cone: (r=1.5, h=3) => ({ type:'cone', r, h, points: { O:[0,0,0], P:[0,0,h] }, edges:[] }),
    pyramid: (a=2, h=3) => ({ points: { A:[-a/2,-a/2,0], B:[a/2,-a/2,0], C:[a/2,a/2,0], D:[-a/2,a/2,0], P:[0,0,h] }, edges: [['A','B'],['B','C'],['C','D'],['D','A'],['A','P'],['B','P'],['C','P'],['D','P']] })
};

/* --- 2. 初始化 3D --- */
let scene, camera, renderer, labelRenderer, controls, group;
let currentBase64 = null;

function init() {
    scene = new THREE.Scene(); scene.background = new THREE.Color(0x0a0e1c);
    camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(10, 8, 10);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('container').appendChild(renderer.domElement);
    labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.domElement.style.position = 'absolute'; labelRenderer.domElement.style.top = '0';
    document.body.appendChild(labelRenderer.domElement);
    controls = new OrbitControls(camera, renderer.domElement);
    group = new THREE.Group(); scene.add(group);
    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const light = new THREE.DirectionalLight(0xffffff, 0.5); light.position.set(5, 10, 7); scene.add(light);
    renderLoop();
}
function renderLoop() { requestAnimationFrame(renderLoop); renderer.render(scene, camera); labelRenderer.render(scene, camera); }

/* --- 3. 图片处理与识别 --- */
window.handleImg = (inp) => {
    const file = inp.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        currentBase64 = e.target.result;
        document.getElementById('img-prev').src = currentBase64;
        document.getElementById('preview-container').style.display = 'block';
    };
    reader.readAsDataURL(file);
};

window.solve = async (useAI = true) => {
    const out = document.getElementById('out');
    const qIn = document.getElementById('qIn');
    const key = localStorage.getItem('zk');
    if(!key) return out.innerHTML = "⚠️ 请先在主站设置 API Key";
    
    out.innerHTML = "正在深度解析中，请稍候...";
    let problemText = qIn.value;

    try {
        // A. 如果有图片，先进行 OCR 识别
        if(currentBase64) {
            out.innerHTML = "📷 正在识别图片内容...";
            const visionResp = await fetch("https://open.bigmodel.cn/api/paas/v4/chat/completions", {
                method: "POST", headers: { "Content-Type": "application/json", "Authorization": "Bearer " + key },
                body: JSON.stringify({
                    model: "glm-4v-flash",
                    messages: [{
                        role: "user", 
                        content: [
                            { type: "text", text: "请完整提取这张图片里的立体几何题目文字。只返回文字内容。" },
                            { type: "image_url", image_url: { url: currentBase64 } }
                        ]
                    }]
                })
            });
            const vData = await visionResp.json();
            problemText = vData.choices[0].message.content;
            qIn.value = problemText; // 回显到文本框
        }

        // B. 画图逻辑 (同步)
        while(group.children.length > 0) group.remove(group.children[0]);
        let spec = /圆柱/.test(problemText) ? GeoKernel.cylinder() : 
                   (/圆锥/.test(problemText) ? GeoKernel.cone() : 
                   (/棱锥/.test(problemText) ? GeoKernel.pyramid() : GeoKernel.cube()));
        
        const vMap = {};
        Object.keys(spec.points).forEach(k => {
            const p = spec.points[k]; vMap[k] = new THREE.Vector3(p[0], p[2], p[1]);
            const dot = new THREE.Mesh(new THREE.SphereGeometry(0.12), new THREE.MeshBasicMaterial({color: 0x7ee0a3}));
            dot.position.copy(vMap[k]); group.add(dot);
            const div = document.createElement('div'); div.className = 'node-label'; div.textContent = k;
            const lbl = new CSS2DObject(div); lbl.position.set(vMap[k].x, vMap[k].y + 0.4, vMap[k].z);
            group.add(lbl);
        });
        
        const lineMat = new THREE.LineBasicMaterial({color: 0x33406e});
        if(spec.edges) spec.edges.forEach(e => {
            const g = new THREE.BufferGeometry().setFromPoints([vMap[e[0]], vMap[e[1]]]);
            group.add(new THREE.Line(g, lineMat));
        });

        if(spec.type === 'cylinder' || spec.type === 'cone') {
            const geo = spec.type === 'cylinder' ? new THREE.CylinderGeometry(spec.r, spec.r, spec.h, 32) : new THREE.ConeGeometry(spec.r, spec.h, 32);
            const mesh = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({color: 0x4f6ef7, transparent: true, opacity: 0.3}));
            mesh.position.y = spec.h/2; group.add(mesh);
        }

        // C. AI 解答
        out.innerHTML = "✅ 模型已生成，正在计算详细步骤...";
        const resp = await fetch("https://open.bigmodel.cn/api/paas/v4/chat/completions", {
            method: "POST", headers: { "Content-Type": "application/json", "Authorization": "Bearer " + key },
            body: JSON.stringify({
                model: "glm-4-flash",
                messages: [{role: "user", content: `你是一位顶级立体几何老师。请详细解答：${problemText}。要求：1.建立坐标系 2.给出计算过程 3.使用LaTeX。`}]
            })
        });
        const data = await resp.json();
        out.innerHTML = "<b>分步解析：</b><br>" + data.choices[0].message.content.replace(/\n/g, "<br>");
        if(window.MathJax) MathJax.typesetPromise();
        
    } catch(e) {
        out.innerHTML = "❌ 操作失败: " + e.message;
    }
};

init();
</script>
</body>
</html>
